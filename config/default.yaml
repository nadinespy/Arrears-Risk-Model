# Default configuration for the arrears risk model.
# Override individual values via ARM_-prefixed environment variables
# (use double underscore as nested delimiter, e.g. ARM_TRAINING__RANDOM_STATE=7).

paths:
  household_data: data/household_data.xlsx
  imd_data: data/File_1_IoD2025_Index_of_Multiple_Deprivation.xlsx
  lewisham_geojson: data/lewisham_lsoa_to_ward_best-fit_lookup.geojson
  model_dir: models
  output_dir: outputs

features:
  # Continuous numeric features.
  continuous:
    - monthly_rent
    - income_after_costs
    - lha_shortfall_weekly
    - ben_cap_amount
    - overpayment_balance
    - imd_rank
  # Binary 0/1 features (post-recoding).
  binary:
    - disability
    - fuel_poverty
    - food_poverty
    - universal_credit
    - ctc_takeup
    - whd_takeup
    - fsm_eligible
  # Nominal categorical features (one-hot for LR, label-encoded for XGB).
  categorical:
    - tenure_type
    - economic_status
    - household_type
    - ward
  # Ordinal features with meaningful order (treated as numeric).
  ordinal:
    - age_bracket
    - imd_decile
  # Features built in src/arrears_risk_model/features.py.
  engineered:
    - total_shortfall  # = lha_shortfall_weekly + ben_cap_amount
  target: arrears_flag
  # Columns dropped before modelling.
  excluded:
    - reference        # household identifier; no predictive meaning
    - lsoa21cd         # raw geographic code; geographic signal captured via imd_rank/imd_decile
    - arrears_amount   # would leak the target
  # Pre-pipeline columns sliced for descriptive fairness metrics.
  sensitive_features:
    - disability
    - household_type
    - age_bracket

imputation:
  # 'zero' chosen so the standalone ben_cap_amount feature and the engineered
  # total_shortfall (= lha_shortfall_weekly + ben_cap_amount.fillna(0)) agree:
  # missing benefit cap is treated as "no cap" rather than "typical-cap value".
  # Applies to every continuous feature, but in practice only ben_cap_amount
  # has any NaN in the source data.
  ben_cap_amount_strategy: zero    # one of: median, mean, constant, zero

models:
  lr:
    C: 1.0
    l1_ratio: 0.0  # 0.0 = L2, 1.0 = L1, in-between = ElasticNet (penalty param removed in sklearn 1.8)
    solver: lbfgs
    max_iter: 1000
    class_weight: balanced  # account for the ~25% / 75% imbalance
  xgb:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 1.0
    colsample_bytree: 1.0
    eval_metric: logloss
    # scale_pos_weight is recomputed per fit by XGBClassifierAutoSPW —
    # not configured here (see src/arrears_risk_model/models.py).

training:
  test_size: 0.2
  cv_n_splits: 5
  cv_stratify: true
  random_state: 42

evaluation:
  threshold: 0.5         # decision cutoff for F1, precision, recall, fairness slices
  calibration_n_bins: 10 # bins in the reliability diagram

hyperparameter_search:
  # Grid search runs as inner CV on the training set; the held-out test
  # set is never seen during tuning.
  enabled: true
  scoring: roc_auc      # one of: roc_auc, pr_auc, f1
  n_jobs: -1            # parallelism across (params × folds)
  lr_grid:
    C: [0.1, 1.0, 10.0]
  xgb_grid:
    n_estimators: [100, 200]
    max_depth: [3, 6]
    learning_rate: [0.05, 0.1]

equity:
  # Additive weights applied to predicted probability for prioritisation.
  # Kept small and auditable — see docs/model_card.md for the framing.
  children: 0.05    # household_type in {lone parent, couple with children} or fsm_eligible
  disability: 0.05  # disability == 1
